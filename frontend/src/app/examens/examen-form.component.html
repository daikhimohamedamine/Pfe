<div class="form-container">
  <div class="page-header"><h1>{{ isEdit ? 'Modifier l\'examen' : 'Nouvel examen' }}</h1></div>
  <mat-card class="form-card mat-elevation-z4">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Type d'examen</mat-label>
            <mat-select formControlName="typeExamens">
              <mat-option *ngFor="let t of types" [value]="t">{{ t }}</mat-option>
            </mat-select>
            <mat-error *ngIf="form.get('typeExamens')?.hasError('required')">Type requis</mat-error>
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Employé</mat-label>
            <mat-select formControlName="employe">
              <mat-option *ngFor="let e of employes" [value]="e">{{ e.prenom }} {{ e.nom }}</mat-option>
            </mat-select>
            <mat-error *ngIf="form.get('employe')?.hasError('required')">Employé requis</mat-error>
          </mat-form-field>
        </div>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Consultation liée (optionnel)</mat-label>
          <mat-select formControlName="consultation">
            <mat-option [value]="null">Aucune</mat-option>
            <mat-option *ngFor="let c of consultations" [value]="c">{{ c.date | date:'dd/MM/yyyy' }} — {{ c.type }}</mat-option>
          </mat-select>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Résultats</mat-label>
          <textarea matInput formControlName="resultats" rows="4"></textarea>
        </mat-form-field>
        <div class="form-actions">
          <button mat-button type="button" (click)="cancel()">Annuler</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || saving">{{ isEdit ? 'Modifier' : 'Créer' }}</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
