<div class="form-container">
  <div class="page-header">
    <h1>{{ isEdit ? 'Modifier l\'employé' : 'Nouvel employé' }}</h1>
  </div>

  <div class="loading-container" *ngIf="loading">
    <mat-progress-spinner mode="indeterminate" diameter="48"></mat-progress-spinner>
  </div>

  <mat-card class="form-card mat-elevation-z4" *ngIf="!loading">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Nom</mat-label>
            <input matInput formControlName="nom">
            <mat-error *ngIf="form.get('nom')?.hasError('required')">Nom requis</mat-error>
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Prénom</mat-label>
            <input matInput formControlName="prenom">
            <mat-error *ngIf="form.get('prenom')?.hasError('required')">Prénom requis</mat-error>
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Date de naissance</mat-label>
            <input matInput [matDatepicker]="dpNaissance" formControlName="dateNaissance">
            <mat-datepicker-toggle matSuffix [for]="dpNaissance"></mat-datepicker-toggle>
            <mat-datepicker #dpNaissance></mat-datepicker>
            <mat-error *ngIf="form.get('dateNaissance')?.hasError('required')">Date requise</mat-error>
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Poste de travail</mat-label>
            <input matInput formControlName="posteTravail">
            <mat-error *ngIf="form.get('posteTravail')?.hasError('required')">Poste requis</mat-error>
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Date d'embauche</mat-label>
            <input matInput [matDatepicker]="dpEmbauche" formControlName="dateEmbauche">
            <mat-datepicker-toggle matSuffix [for]="dpEmbauche"></mat-datepicker-toggle>
            <mat-datepicker #dpEmbauche></mat-datepicker>
            <mat-error *ngIf="form.get('dateEmbauche')?.hasError('required')">Date requise</mat-error>
          </mat-form-field>
          <div class="checkbox-field">
            <mat-checkbox formControlName="vaccination">Vacciné(e)</mat-checkbox>
          </div>
        </div>

        <div class="form-actions">
          <button mat-button type="button" (click)="cancel()">Annuler</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || saving">
            <mat-spinner diameter="20" *ngIf="saving"></mat-spinner>
            <span *ngIf="!saving">{{ isEdit ? 'Modifier' : 'Créer' }}</span>
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
