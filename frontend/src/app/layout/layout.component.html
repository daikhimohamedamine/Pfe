<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav [opened]="sidenavOpened" mode="side" class="sidenav">
    <div class="sidenav-header">
      <mat-icon class="brand-icon">local_hospital</mat-icon>
      <div class="brand-text">
        <span class="brand-name">MedRecords</span>
        <span class="brand-sub">Gestion Médicale</span>
      </div>
    </div>

    <mat-divider></mat-divider>

    <div class="user-info">
      <div class="avatar">{{ userName.charAt(0).toUpperCase() }}</div>
      <div class="user-details">
        <span class="user-name">{{ userName }}</span>
        <span class="user-role">{{ getRoleLabel() }}</span>
      </div>
    </div>

    <mat-divider></mat-divider>

    <mat-nav-list class="nav-list">
      <a mat-list-item
        *ngFor="let item of visibleNavItems"
        [routerLink]="item.route"
        routerLinkActive="active-link"
        class="nav-item">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <mat-toolbar class="toolbar" color="primary">
      <button mat-icon-button (click)="sidenav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">Système de Gestion des Dossiers Médicaux</span>
      <span class="spacer"></span>
      <button mat-icon-button [matMenuTriggerFor]="userMenu" matTooltip="Mon compte">
        <mat-icon>account_circle</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu">
        <div class="menu-user-info" mat-menu-item disabled>
          <mat-icon>person</mat-icon>
          <span>{{ userName }}</span>
        </div>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Se déconnecter</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
