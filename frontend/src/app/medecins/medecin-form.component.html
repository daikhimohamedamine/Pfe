<div class="form-container">
  <div class="page-header">
    <h1>{{ isEdit ? 'Modifier le médecin' : 'Nouveau médecin' }}</h1>
  </div>
  <mat-card class="form-card mat-elevation-z4">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nom complet</mat-label>
          <input matInput formControlName="nom">
          <mat-error *ngIf="form.get('nom')?.hasError('required')">Nom requis</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Spécialité</mat-label>
          <mat-select formControlName="specialite">
            <mat-option *ngFor="let s of specialites" [value]="s">{{ s }}</mat-option>
          </mat-select>
          <mat-error *ngIf="form.get('specialite')?.hasError('required')">Spécialité requise</mat-error>
        </mat-form-field>

        <div class="form-actions">
          <button mat-button type="button" (click)="cancel()">Annuler</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || saving">
            {{ isEdit ? 'Modifier' : 'Créer' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
