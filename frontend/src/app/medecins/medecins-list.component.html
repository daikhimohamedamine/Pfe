<div class="page-container">
  <div class="page-header">
    <h1><mat-icon>local_hospital</mat-icon> Médecins</h1>
    <button mat-raised-button color="primary" (click)="navigateToNew()">
      <mat-icon>add</mat-icon> Nouveau médecin
    </button>
  </div>

  <mat-card class="mat-elevation-z4">
    <mat-card-content>
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Rechercher</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Nom, spécialité...">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <div class="loading-container" *ngIf="loading">
        <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
      </div>

      <div class="table-container" *ngIf="!loading">
        <table mat-table [dataSource]="dataSource" matSort>
          <ng-container matColumnDef="nom">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Nom</th>
            <td mat-cell *matCellDef="let row">{{ row.nom }}</td>
          </ng-container>
          <ng-container matColumnDef="specialite">
            <th mat-header-cell *matHeaderCellDef mat-sort-header>Spécialité</th>
            <td mat-cell *matCellDef="let row">{{ row.specialite }}</td>
          </ng-container>
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let row">
              <div class="actions-cell">
                <button mat-icon-button color="accent" matTooltip="Modifier" (click)="navigateToEdit(row.id)">
                  <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" matTooltip="Supprimer" (click)="delete(row.id)">
                  <mat-icon>delete</mat-icon>
                </button>
              </div>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" colspan="3">
              <div class="empty-state">
                <mat-icon>person_off</mat-icon>
                <p>Aucun médecin trouvé</p>
              </div>
            </td>
          </tr>
        </table>
        <mat-paginator [pageSizeOptions]="[10, 25, 50]" showFirstLastButtons></mat-paginator>
      </div>
    </mat-card-content>
  </mat-card>
</div>
