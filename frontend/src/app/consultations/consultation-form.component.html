<div class="form-container">
  <div class="page-header">
    <h1>{{ isEdit ? 'Modifier la consultation' : 'Nouvelle consultation' }}</h1>
  </div>
  <mat-card class="form-card mat-elevation-z4">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Date</mat-label>
            <input matInput [matDatepicker]="dp" formControlName="date">
            <mat-datepicker-toggle matSuffix [for]="dp"></mat-datepicker-toggle>
            <mat-datepicker #dp></mat-datepicker>
            <mat-error *ngIf="form.get('date')?.hasError('required')">Date requise</mat-error>
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Type</mat-label>
            <mat-select formControlName="type">
              <mat-option *ngFor="let t of types" [value]="t">{{ t }}</mat-option>
            </mat-select>
            <mat-error *ngIf="form.get('type')?.hasError('required')">Type requis</mat-error>
          </mat-form-field>
        </div>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Motif</mat-label>
          <input matInput formControlName="motif">
          <mat-error *ngIf="form.get('motif')?.hasError('required')">Motif requis</mat-error>
        </mat-form-field>
        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Employé</mat-label>
            <mat-select formControlName="employe">
              <mat-option *ngFor="let e of employes" [value]="e">{{ e.prenom }} {{ e.nom }}</mat-option>
            </mat-select>
            <mat-error *ngIf="form.get('employe')?.hasError('required')">Employé requis</mat-error>
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>Médecin</mat-label>
            <mat-select formControlName="medecin">
              <mat-option *ngFor="let m of medecins" [value]="m">{{ m.nom }} — {{ m.specialite }}</mat-option>
            </mat-select>
            <mat-error *ngIf="form.get('medecin')?.hasError('required')">Médecin requis</mat-error>
          </mat-form-field>
        </div>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Observations</mat-label>
          <textarea matInput formControlName="observations" rows="3"></textarea>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Examen clinique</mat-label>
          <textarea matInput formControlName="examen" rows="3"></textarea>
        </mat-form-field>
        <div class="form-actions">
          <button mat-button type="button" (click)="cancel()">Annuler</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || saving">
            {{ isEdit ? 'Modifier' : 'Créer' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
