<div class="form-container">
  <div class="page-header"><h1>{{ isEdit ? 'Modifier l\'utilisateur' : 'Nouvel utilisateur' }}</h1></div>
  <mat-card class="form-card mat-elevation-z4">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nom d'utilisateur</mat-label>
          <input matInput formControlName="userName" autocomplete="username">
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="form.get('userName')?.hasError('required')">Nom requis</mat-error>
          <mat-error *ngIf="form.get('userName')?.hasError('minlength')">Minimum 3 caractères</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Mot de passe {{ isEdit ? '(laisser vide pour ne pas changer)' : '' }}</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" autocomplete="new-password">
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="form.get('password')?.hasError('required')">Mot de passe requis</mat-error>
          <mat-error *ngIf="form.get('password')?.hasError('minlength')">Minimum 6 caractères</mat-error>
        </mat-form-field>

        <div class="form-row">
          <mat-form-field appearance="outline">
            <mat-label>Rôle</mat-label>
            <mat-select formControlName="role">
              <mat-option *ngFor="let r of roles" [value]="r">{{ r }}</mat-option>
            </mat-select>
          </mat-form-field>
          <div class="checkbox-field">
            <mat-checkbox formControlName="enabled">Compte actif</mat-checkbox>
          </div>
        </div>

        <div class="form-actions">
          <button mat-button type="button" (click)="cancel()">Annuler</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || saving">
            {{ isEdit ? 'Modifier' : 'Créer' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
