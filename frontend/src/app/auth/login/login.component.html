<div class="login-container">
  <div class="login-card mat-elevation-z8">
    <div class="login-header">
      <mat-icon class="login-icon">local_hospital</mat-icon>
      <h1>Dossiers Médicaux</h1>
      <p>Système de Gestion Médicale</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Nom d'utilisateur</mat-label>
        <input matInput formControlName="userName" placeholder="Entrez votre nom d'utilisateur" autocomplete="username">
        <mat-icon matSuffix>person</mat-icon>
        <mat-error *ngIf="loginForm.get('userName')?.hasError('required')">
          Le nom d'utilisateur est requis
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Mot de passe</mat-label>
        <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" autocomplete="current-password">
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
          Le mot de passe est requis
        </mat-error>
        <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
          Le mot de passe doit contenir au moins 4 caractères
        </mat-error>
      </mat-form-field>

      <div class="error-message" *ngIf="error">
        <mat-icon>error_outline</mat-icon>
        <span>{{ error }}</span>
      </div>

      <button
        mat-raised-button
        color="primary"
        type="submit"
        class="login-btn"
        [disabled]="loading">
        <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
        <span *ngIf="!loading">Se connecter</span>
      </button>
    </form>
  </div>
</div>
